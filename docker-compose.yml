services:
  mongodb:
    image: mongo:7
    container_name: soundwave_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: soundwave_records
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: soundwave_app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - vendor_data:/app/vendor   # preserve vendor/ built in the image
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017

volumes:
  mongo_data:
  vendor_data:
